<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
    <div class="page">
        <div class="container narrow">
            <div class="topbar">
                <a href="/" class="home-link"><span class="home-icon">🌿</span><span>Главная</span></a>
                <div class="nav">
                    <a href="/" class="nav-btn">Поиск по фото</a>
                    <a href="/selection" class="nav-btn">Подбор по условиям</a>
                    <a href="/history" class="nav-btn">История</a>
                </div>
                <div class="auth-links">
                    {% if user %}
                        <a href="/profile" class="user-chip">{{ user.username }}</a>
                        <a href="/logout" class="logout-btn">Выйти</a>
                    {% else %}
                        <a href="/login" class="nav-btn active">Войти</a>
                        <a href="/register" class="nav-btn">Регистрация</a>
                    {% endif %}
                </div>
            </div>

            <h1>Вход</h1>
            <p class="description">Войдите по логину или email.</p>

            {% if error %}
                <div class="error-box">{{ error }}</div>
            {% endif %}

            <form method="post" action="/login">
                <div class="form-container">
                    <div class="form-group">
                        <label for="login">Логин или Email</label>
                        <input type="text" id="login" name="login" required value="{{ form_data.login }}">
                    </div>

                    <div class="form-group">
                        <label for="password">Пароль</label>
                        <input type="password" id="password" name="password" required>
                    </div>

                    <button type="submit">Войти</button>
                </div>
            </form>

            <div class="center-links">
                Нет аккаунта? <a href="/register">Зарегистрироваться</a><br><br>
                <a href="/">На главную</a>
            </div>
        </div>
    </div>
</body>
</html>
